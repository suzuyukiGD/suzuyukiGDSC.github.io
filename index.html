<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>凉宫春日应援团 · 展示商城</title>
  <!-- Font Awesome 6 (免费图标库) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #f5f7fb;
      color: #1a2639;
      line-height: 1.5;
    }

    .app {
      max-width: 1600px;
      margin: 0 auto;
      padding: 1.5rem 2rem;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      background: white;
      padding: 1rem 2rem;
      border-radius: 40px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.03);
    }

    .logo {
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: -0.5px;
      background: linear-gradient(145deg, #1e3c4f, #2b5c7c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo i {
      color: #2b5c7c;
      margin-right: 6px;
      -webkit-text-fill-color: initial;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      align-items: center;
    }
    .nav-links a {
      text-decoration: none;
      color: #2c3e50;
      font-weight: 500;
      transition: 0.2s;
      font-size: 1.1rem;
      cursor: pointer;
    }
    .nav-links a:hover {
      color: #1e6f9f;
    }
    .nav-links a i {
      margin-right: 6px;
    }

    .cart-icon-badge {
      background: #1e3c4f;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 40px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .cart-icon-badge:hover {
      background: #143343;
    }
    .cart-count {
      background: white;
      color: #1e3c4f;
      border-radius: 30px;
      padding: 2px 10px;
      font-weight: 700;
    }

    .main-panel {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .product-section {
      flex: 2.5;
      min-width: 300px;
    }

    .cart-sidebar {
      flex: 1.2;
      min-width: 320px;
      background: white;
      border-radius: 32px;
      padding: 1.6rem 1.4rem;
      box-shadow: 0 20px 35px -8px rgba(0,40,60,0.1);
      height: fit-content;
      position: sticky;
      top: 1.5rem;
    }

    /* 四个视图切换 */
    .cart-view, .address-view, .payment-view, .order-query-view {
      transition: opacity 0.2s;
    }
    .address-view, .payment-view, .order-query-view {
      display: none; /* 初始隐藏地址、支付和查询视图 */
    }

    .section-title {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title i {
      color: #2b5c7c;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 1.8rem;
      margin-bottom: 3rem;
    }

    .product-card {
      background: white;
      border-radius: 28px;
      padding: 1.6rem 1.2rem 1.4rem;
      text-align: center;
      box-shadow: 0 10px 20px rgba(0,0,0,0.02);
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid rgba(0,0,0,0.02);
    }
    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 25px 30px -12px rgba(30,60,80,0.15);
    }
    .product-icon {
      background: #eef5fa;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.2rem;
      color: #1e3c4f;
    }
    .product-name {
      font-weight: 700;
      font-size: 1.3rem;
      margin-bottom: 0.4rem;
    }
    .product-price {
      font-size: 1.4rem;
      font-weight: 600;
      color: #1b4a6b;
      margin: 0.6rem 0 1rem;
    }
    .add-to-cart-btn {
      background: transparent;
      border: 2px solid #1e3c4f;
      color: #1e3c4f;
      font-weight: 600;
      padding: 0.7rem 1.2rem;
      border-radius: 40px;
      width: 100%;
      cursor: pointer;
      transition: 0.2s;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .add-to-cart-btn:hover {
      background: #1e3c4f;
      color: white;
    }

    .uniform-section {
      background: linear-gradient(115deg, #f1f7fc, #e7f0f8);
      border-radius: 40px;
      padding: 2rem 2rem 2rem 2.5rem;
      margin-top: 2rem;
      border: 1px solid rgba(60, 110, 140, 0.2);
    }
    .uniform-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .uniform-header h2 {
      font-size: 2rem;
      font-weight: 650;
    }
    .qr-container {
      background: white;
      padding: 1rem 1rem 0.8rem;
      border-radius: 32px;
      text-align: center;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
      max-width: 180px;
    }
    .qr-container img {
      width: 120px;
      height: 120px;
      border-radius: 16px;
      margin-bottom: 6px;
    }
    .qr-container p {
      font-size: 0.9rem;
      color: #2b4e6b;
      font-weight: 500;
    }
    .uniform-products {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      margin-top: 1.5rem;
    }
    .uniform-card {
      background: white;
      border-radius: 30px;
      padding: 1.6rem 1.8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 180px;
      flex: 1 1 200px;
      box-shadow: 0 8px 18px rgba(0,30,50,0.05);
    }

    /* 购物车视图 */
    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .cart-header h3 {
      font-size: 1.6rem;
      font-weight: 650;
    }
    .cart-items {
      max-height: 340px;
      overflow-y: auto;
      padding-right: 5px;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid #e2eaf1;
    }
    .cart-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0;
      border-top: 1px solid #ecf3f8;
    }
    .cart-item:first-child {
      border-top: none;
    }
    .cart-item-info {
      flex: 2;
    }
    .cart-item-title {
      font-weight: 600;
      font-size: 1rem;
    }
    .cart-item-price {
      font-size: 0.9rem;
      color: #386a8c;
    }
    .cart-item-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cart-item-actions button {
      background: #f0f5fa;
      border: none;
      width: 30px;
      height: 30px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 1.2rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #1b3b4e;
      transition: 0.2s;
    }
    .cart-item-actions button:hover {
      background: #d0e0ed;
    }
    .cart-item-qty {
      min-width: 22px;
      text-align: center;
      font-weight: 600;
    }
    .cart-item-subtotal {
      min-width: 65px;
      text-align: right;
      font-weight: 600;
      color: #1e3c4f;
    }
    .remove-item {
      background: transparent !important;
      color: #b00f1f !important;
      font-size: 1rem !important;
      width: auto !important;
      margin-left: 4px;
    }
    .cart-total {
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      font-size: 1.3rem;
      margin: 1rem 0 1.5rem;
      padding-top: 0.5rem;
    }
    .checkout-btn {
      background: #1e3c4f;
      color: white;
      border: none;
      padding: 1rem;
      width: 100%;
      border-radius: 60px;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: background 0.2s;
    }
    .checkout-btn:hover {
      background: #0f2a38;
    }

    .email-reminder {
      background: #e9f2f9;
      border-radius: 30px;
      padding: 1.5rem 1.2rem;
      margin-top: 1rem;
    }
    .email-reminder p {
      font-weight: 500;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #1a3e54;
    }
    .email-input-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .email-input-group input {
      flex: 1;
      padding: 0.9rem 1.2rem;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      background: white;
      outline: none;
      border: 1px solid transparent;
    }
    .email-input-group input:focus {
      border-color: #1e6f9f;
    }
    .email-input-group button {
      background: #1e3c4f;
      border: none;
      color: white;
      padding: 0 1.8rem;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      font-size: 1rem;
      white-space: nowrap;
    }
    .email-input-group button:hover {
      background: #123140;
    }

    .empty-cart-msg {
      color: #798b9b;
      text-align: center;
      padding: 2rem 0;
    }

    /* 地址视图 (收货信息表单) */
    .address-view {
      text-align: left;
    }
    .address-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .address-header h3 {
      font-size: 1.6rem;
      font-weight: 650;
    }
    .address-form {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      margin: 2rem 0;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .form-group label {
      font-weight: 600;
      color: #1e3c4f;
      margin-left: 0.5rem;
    }
    .form-group input, .form-group textarea {
      padding: 0.9rem 1.2rem;
      border: 1px solid #dae2e9;
      border-radius: 30px;
      font-size: 1rem;
      background: white;
      outline: none;
      transition: border 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus {
      border-color: #1e6f9f;
    }
    .form-group textarea {
      min-height: 80px;
      resize: vertical;
    }
    .address-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }
    .submit-order-btn {
      background: #1e3c4f;
      color: white;
      border: none;
      padding: 1rem;
      flex: 2;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      font-size: 1.1rem;
    }
    .back-to-cart-addr-btn {
      background: transparent;
      border: 2px solid #1e3c4f;
      color: #1e3c4f;
      padding: 1rem;
      flex: 1;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      font-size: 1.1rem;
    }

    /* 支付视图 */
    .payment-view {
      text-align: center;
    }
    .payment-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .payment-header h3 {
      font-size: 1.6rem;
      font-weight: 650;
    }
    .order-number {
      background: #f0f6fb;
      padding: 0.8rem;
      border-radius: 50px;
      font-weight: 600;
      margin-bottom: 1.5rem;
      word-break: break-word;
      color: #1a4b6d;
    }
    .payment-amount {
      background: #e9f2f9;
      padding: 1rem;
      border-radius: 50px;
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e3c4f;
      margin-bottom: 2rem;
    }
    .qr-row {
      display: flex;
      justify-content: space-around;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin: 2rem 0;
    }
    .qr-item {
      background: #f5f9ff;
      padding: 1.2rem 1rem;
      border-radius: 30px;
      flex: 1 1 150px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.03);
    }
    .qr-item img {
      width: 140px;
      height: 140px;
      border-radius: 20px;
      background: white;
      padding: 8px;
      margin-bottom: 10px;
    }
    .qr-item p {
      font-weight: 600;
      color: #1b4a6b;
    }
    .back-to-cart-btn {
      background: transparent;
      border: 2px solid #1e3c4f;
      color: #1e3c4f;
      padding: 0.9rem 2rem;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 2rem;
      width: 100%;
      font-size: 1.1rem;
      transition: 0.2s;
    }
    .back-to-cart-btn:hover {
      background: #1e3c4f;
      color: white;
    }

    /* 订单查询视图 */
    .order-query-view {
      text-align: left;
    }
    .query-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .query-header h3 {
      font-size: 1.6rem;
      font-weight: 650;
    }
    .query-input-group {
      display: flex;
      gap: 0.5rem;
      margin: 1.5rem 0;
    }
    .query-input-group input {
      flex: 1;
      padding: 0.9rem 1.2rem;
      border: 1px solid #dae2e9;
      border-radius: 50px;
      font-size: 1rem;
    }
    .query-input-group button {
      background: #1e3c4f;
      border: none;
      color: white;
      padding: 0 1.8rem;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
    }
    .order-result {
      background: #f0f6fb;
      border-radius: 30px;
      padding: 1.5rem;
      margin: 1rem 0;
      max-height: 350px;
      overflow-y: auto;
    }
    .order-result p {
      margin: 0.5rem 0;
    }
    .order-result hr {
      margin: 1rem 0;
      border: 1px solid #cbd6e3;
    }
    .not-found {
      color: #b00f1f;
      text-align: center;
      padding: 2rem;
    }
    .back-to-cart-query-btn {
      background: transparent;
      border: 2px solid #1e3c4f;
      color: #1e3c4f;
      padding: 0.9rem 2rem;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
      width: 100%;
    }

    @media (max-width: 1000px) {
      .main-panel {
        flex-direction: column;
      }
      .cart-sidebar {
        position: static;
        width: 100%;
      }
    }
  </style>
</head>
<body>
<div class="app">
  <nav class="navbar">
    <div class="logo">
      <i class="fas fa-vest"></i> UNIFORM·风尚
    </div>
    <div class="nav-links">
      <a href="#"><i class="fas fa-home"></i>首页</a>
      <a href="#uniform-section"><i class="fas fa-user-tie"></i>制服专区</a>
      <a id="queryOrderLink"><i class="fas fa-search"></i>订单查询</a>
      <div class="cart-icon-badge" id="cartToggle">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-count" id="cartCount">0</span>
      </div>
    </div>
  </nav>

  <div class="main-panel">
    <div class="product-section">
      <div class="section-title">
        <i class="fas fa-shirt fa-2x"></i>
        <span>本季精选</span>
      </div>
      <div class="product-grid" id="productGrid"></div>

      <div id="uniform-section" class="uniform-section">
        <div class="uniform-header">
          <h2><i class="fas fa-user-tie" style="margin-right: 12px;"></i> 职业制服系列</h2>
          <div class="qr-container">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://example.com/uniform-collection&bgcolor=FFFFFF&color=1E3C4F" alt="制服二维码">
            <p><i class="fas fa-camera"></i> 扫码进入制服微站</p>
          </div>
        </div>
        <div class="uniform-products" id="uniformContainer"></div>
      </div>
    </div>

    <!-- 购物车侧边栏 (包含四个视图) -->
    <div class="cart-sidebar" id="cartSidebar">
      <!-- 购物车主视图 -->
      <div class="cart-view" id="cartView">
        <div class="cart-header">
          <h3><i class="fas fa-shopping-bag" style="margin-right: 10px;"></i>购物车</h3>
          <i class="fas fa-box-open" style="color:#1e3c4f;"></i>
        </div>
        <div id="cartItemsContainer" class="cart-items"></div>
        <div class="cart-total" id="cartTotal">
          <span>总计</span>
          <span id="totalAmount">¥0</span>
        </div>
        <!-- 结算按钮 -->
        <button class="checkout-btn" id="checkoutBtn"><i class="fas fa-credit-card"></i> 去结算</button>
        <div class="email-reminder">
          <p><i class="fas fa-envelope-open-text"></i> 购物车邮件提醒</p>
          <div class="email-input-group">
            <input type="email" id="reminderEmail" placeholder="您的邮箱" value="customer@example.com">
            <button id="sendEmailReminder"><i class="fas fa-paper-plane"></i> 发送</button>
          </div>
          <small style="display: block; margin-top: 10px; color: #3f627c;">我们将发送购物车明细及优惠</small>
        </div>
      </div>

      <!-- 收货信息视图 -->
      <div class="address-view" id="addressView">
        <div class="address-header">
          <h3><i class="fas fa-truck"></i> 收货信息</h3>
          <i class="fas fa-address-card" style="color:#1e3c4f;"></i>
        </div>
        <div class="address-form">
          <div class="form-group">
            <label><i class="fas fa-user"></i> 收货人</label>
            <input type="text" id="receiverName" placeholder="姓名" value="张三">
          </div>
          <div class="form-group">
            <label><i class="fas fa-phone"></i> 手机号码</label>
            <input type="tel" id="receiverPhone" placeholder="11位手机号" value="13800138000">
          </div>
          <div class="form-group">
            <label><i class="fas fa-envelope"></i> 电子邮箱（用于邮箱提醒）</label>
            <input type="email" id="receiverEmail" placeholder="your@email.com" value="zhangsan@example.com">
          </div>
          <div class="form-group">
            <label><i class="fas fa-map-marker-alt"></i> 收货地址</label>
            <textarea id="receiverAddress" placeholder="详细地址">北京市朝阳区XX路1号</textarea>
          </div>
        </div>
        <div class="address-actions">
          <button class="submit-order-btn" id="submitOrderBtn"><i class="fas fa-check-circle"></i> 提交订单</button>
          <button class="back-to-cart-addr-btn" id="backToCartFromAddrBtn"><i class="fas fa-arrow-left"></i> 返回</button>
        </div>
      </div>

      <!-- 支付视图 -->
      <div class="payment-view" id="paymentView">
        <div class="payment-header">
          <h3><i class="fas fa-qrcode"></i> 扫码支付</h3>
          <i class="fas fa-credit-card" style="color:#1e3c4f;"></i>
        </div>
        <div class="order-number" id="orderNumberDisplay">订单号：</div>
        <div class="payment-amount" id="paymentAmount">¥0</div>
        <div class="qr-row">
          <div class="qr-item">
            <img id="wechatQR" src="" alt="微信支付二维码">
            <p><i class="fab fa-weixin"></i> 微信支付</p>
          </div>
          <div class="qr-item">
            <img id="alipayQR" src="" alt="支付宝支付二维码">
            <p><i class="fab fa-alipay"></i> 支付宝</p>
          </div>
        </div>
        <button class="back-to-cart-btn" id="backToCartBtn"><i class="fas fa-arrow-left"></i> 返回购物车</button>
      </div>

      <!-- 订单查询视图 (新增) -->
      <div class="order-query-view" id="orderQueryView">
        <div class="query-header">
          <h3><i class="fas fa-search"></i> 订单查询</h3>
          <i class="fas fa-file-invoice" style="color:#1e3c4f;"></i>
        </div>
        <div class="query-input-group">
          <input type="text" id="orderQueryInput" placeholder="输入订单号 (如 ORD-250303-1234)">
          <button id="queryOrderBtn"><i class="fas fa-search"></i> 查询</button>
        </div>
        <div id="orderResult" class="order-result">
          <!-- 查询结果显示在这里 -->
          <p style="color:#798b9b; text-align:center;">输入订单号后点击查询</p>
        </div>
        <button class="back-to-cart-query-btn" id="backToCartFromQueryBtn"><i class="fas fa-arrow-left"></i> 返回购物车</button>
      </div>
    </div>
  </div>
</div>

<script>
  (function() {
    // 商品数据
    const products = [
      { id: 1, name: '经典牛津纺衬衫', price: 229, icon: 'fa-shirt', type: 'normal' },
      { id: 2, name: '休闲棉质Polo', price: 189, icon: 'fa-shirt', type: 'normal' },
      { id: 3, name: '修身斜纹西裤', price: 279, icon: 'fa-user-tie', type: 'normal' },
      { id: 4, name: '轻奢羊毛开衫', price: 359, icon: 'fa-vest', type: 'normal' }
    ];

    const uniformProducts = [
      { id: 5, name: '酒店接待西装', price: 599, icon: 'fa-user-tie', type: 'uniform' },
      { id: 6, name: '行政衬衫+领带', price: 349, icon: 'fa-tie', type: 'uniform' }
    ];

    let cart = [];

    // 存储所有订单的数组 (模拟数据库)
    let orders = [];

    // 地址信息 & 当前生成的订单号
    let addressInfo = { name: '', phone: '', email: '', address: '' };
    let orderNo = '';

    // 获取DOM元素
    const cartView = document.getElementById('cartView');
    const addressView = document.getElementById('addressView');
    const paymentView = document.getElementById('paymentView');
    const orderQueryView = document.getElementById('orderQueryView');

    const checkoutBtn = document.getElementById('checkoutBtn');
    const backToCartFromAddrBtn = document.getElementById('backToCartFromAddrBtn');
    const submitOrderBtn = document.getElementById('submitOrderBtn');
    const backToCartBtn = document.getElementById('backToCartBtn');
    const queryOrderLink = document.getElementById('queryOrderLink');
    const backToCartFromQueryBtn = document.getElementById('backToCartFromQueryBtn');
    const queryOrderBtn = document.getElementById('queryOrderBtn');
    const orderQueryInput = document.getElementById('orderQueryInput');
    const orderResultDiv = document.getElementById('orderResult');

    const orderNumberDisplay = document.getElementById('orderNumberDisplay');
    const paymentAmountSpan = document.getElementById('paymentAmount');
    const wechatQRImg = document.getElementById('wechatQR');
    const alipayQRImg = document.getElementById('alipayQR');

    // 渲染商品
    function renderProductGrid() {
      const grid = document.getElementById('productGrid');
      grid.innerHTML = products.map(p => `
        <div class="product-card">
          <div class="product-icon"><i class="fas ${p.icon} fa-3x"></i></div>
          <div class="product-name">${p.name}</div>
          <div class="product-price">¥${p.price}</div>
          <button class="add-to-cart-btn" data-id="${p.id}" data-name="${p.name}" data-price="${p.price}">
            <i class="fas fa-cart-plus"></i> 加入购物车
          </button>
        </div>
      `).join('');
    }

    function renderUniformSection() {
      const container = document.getElementById('uniformContainer');
      container.innerHTML = uniformProducts.map(p => `
        <div class="uniform-card">
          <div class="product-icon" style="background: #dee9f2;"><i class="fas ${p.icon} fa-3x"></i></div>
          <div class="product-name">${p.name}</div>
          <div class="product-price">¥${p.price}</div>
          <button class="add-to-cart-btn" data-id="${p.id}" data-name="${p.name}" data-price="${p.price}">
            <i class="fas fa-cart-plus"></i> 加入购物车
          </button>
        </div>
      `).join('');
    }

    // 购物车操作
    function addToCart(id, name, price) {
      const existing = cart.find(item => item.id === id);
      if (existing) {
        existing.quantity += 1;
      } else {
        cart.push({ id, name, price, quantity: 1 });
      }
      updateCartUI();
    }

    function updateQuantity(id, delta) {
      const idx = cart.findIndex(item => item.id === id);
      if (idx === -1) return;
      const item = cart[idx];
      const newQty = item.quantity + delta;
      if (newQty <= 0) {
        cart.splice(idx, 1);
      } else {
        item.quantity = newQty;
      }
      updateCartUI();
    }

    function removeItem(id) {
      cart = cart.filter(item => item.id !== id);
      updateCartUI();
    }

    function calcTotal() {
      return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    }

    // 更新购物车UI
    function renderCart() {
      const container = document.getElementById('cartItemsContainer');
      const totalSpan = document.getElementById('totalAmount');
      const cartCountSpan = document.getElementById('cartCount');

      if (cart.length === 0) {
        container.innerHTML = `<div class="empty-cart-msg"><i class="fas fa-shopping-cart fa-2x" style="opacity:0.4; margin-bottom:10px;"></i><br/>购物车还是空的<br/>去逛逛精选制服吧</div>`;
        totalSpan.innerText = `¥0`;
        cartCountSpan.innerText = '0';
        return;
      }

      let html = '';
      cart.forEach(item => {
        const subtotal = item.price * item.quantity;
        html += `
          <div class="cart-item" data-id="${item.id}">
            <div class="cart-item-info">
              <div class="cart-item-title">${item.name}</div>
              <div class="cart-item-price">¥${item.price}</div>
            </div>
            <div class="cart-item-actions">
              <button class="cart-dec" data-id="${item.id}">−</button>
              <span class="cart-item-qty">${item.quantity}</span>
              <button class="cart-inc" data-id="${item.id}">+</button>
              <button class="remove-item" data-id="${item.id}"><i class="fas fa-trash-alt"></i></button>
            </div>
            <div class="cart-item-subtotal">¥${subtotal}</div>
          </div>
        `;
      });
      container.innerHTML = html;

      const total = calcTotal();
      totalSpan.innerText = `¥${total}`;
      const itemCount = cart.reduce((acc, i) => acc + i.quantity, 0);
      cartCountSpan.innerText = itemCount;
    }

    function updateCartUI() {
      renderCart();
    }

    // 视图切换函数
    function showCartView() {
      cartView.style.display = 'block';
      addressView.style.display = 'none';
      paymentView.style.display = 'none';
      orderQueryView.style.display = 'none';
    }

    function showAddressView() {
      cartView.style.display = 'none';
      addressView.style.display = 'block';
      paymentView.style.display = 'none';
      orderQueryView.style.display = 'none';
    }

    function showPaymentView() {
      cartView.style.display = 'none';
      addressView.style.display = 'none';
      paymentView.style.display = 'block';
      orderQueryView.style.display = 'none';
    }

    function showOrderQueryView() {
      cartView.style.display = 'none';
      addressView.style.display = 'none';
      paymentView.style.display = 'none';
      orderQueryView.style.display = 'block';
    }

    // 生成订单号 (简单模拟)
    function generateOrderNo() {
      const now = new Date();
      const yymmdd = now.getFullYear().toString().slice(-2) + 
                     (now.getMonth()+1).toString().padStart(2,'0') + 
                     now.getDate().toString().padStart(2,'0');
      const random = Math.floor(Math.random() * 10000).toString().padStart(4,'0');
      return `ORD-${yymmdd}-${random}`;
    }

    // 验证地址表单
    function validateAddressForm() {
      const name = document.getElementById('receiverName').value.trim();
      const phone = document.getElementById('receiverPhone').value.trim();
      const email = document.getElementById('receiverEmail').value.trim();
      const addr = document.getElementById('receiverAddress').value.trim();

      if (!name) { alert('请输入收货人姓名'); return false; }
      if (!phone || !/^1[3-9]\d{9}$/.test(phone)) { alert('请输入正确的手机号码'); return false; }
      if (!email || !/^\S+@\S+\.\S+$/.test(email)) { alert('请输入有效的电子邮箱'); return false; }
      if (!addr) { alert('请输入收货地址'); return false; }

      addressInfo = { name, phone, email, address: addr };
      return true;
    }

    // 提交订单：验证、保存订单、生成订单号、发邮件、切换到支付视图
    function handleSubmitOrder() {
      if (!validateAddressForm()) return;

      // 生成订单号
      orderNo = generateOrderNo();

      // 构建订单对象
      const order = {
        orderNo: orderNo,
        address: { ...addressInfo },
        items: cart.map(item => ({ ...item })), // 深拷贝
        total: calcTotal(),
        status: '待付款', // 默认状态
        createdAt: new Date().toLocaleString()
      };
      orders.push(order);  // 保存到数组供查询

      // 模拟发送邮箱提醒（使用地址中的邮箱）
      const cartSummary = cart.map(i => `${i.name} x${i.quantity} = ¥${i.price*i.quantity}`).join('； ');
      alert(`📧 订单确认邮件已发送至 ${addressInfo.email}\n\n订单号：${orderNo}\n收货人：${addressInfo.name}\n电话：${addressInfo.phone}\n地址：${addressInfo.address}\n购物车内容：\n${cartSummary}\n总计 ¥${order.total}\n(演示模式)`);

      // 切换到支付视图
      showPaymentView();

      // 更新支付视图内容
      paymentAmountSpan.innerText = `¥${order.total}`;
      orderNumberDisplay.innerText = `订单号：${orderNo}`;

      // 生成二维码 (示例，实际应使用真实支付链接)
      const wechatData = `微信支付订单 ${orderNo} 金额¥${order.total}`;
      const alipayData = `支付宝支付订单 ${orderNo} 金额¥${order.total}`;
      wechatQRImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=${encodeURIComponent(wechatData)}`;
      alipayQRImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=${encodeURIComponent(alipayData)}`;
    }

    // 查询订单
    function handleQueryOrder() {
      const queryNo = orderQueryInput.value.trim();
      if (!queryNo) {
        orderResultDiv.innerHTML = `<p class="not-found">请输入订单号</p>`;
        return;
      }

      const foundOrder = orders.find(o => o.orderNo === queryNo);
      if (!foundOrder) {
        orderResultDiv.innerHTML = `<p class="not-found"><i class="fas fa-exclamation-circle"></i> 未找到订单号: ${queryNo}</p>`;
        return;
      }

      // 显示订单详情
      const itemsHtml = foundOrder.items.map(item => 
        `<div style="display:flex; justify-content:space-between; padding:4px 0;">
          <span>${item.name} x${item.quantity}</span>
          <span>¥${item.price * item.quantity}</span>
        </div>`
      ).join('');

      orderResultDiv.innerHTML = `
        <p><strong>订单号：</strong>${foundOrder.orderNo}</p>
        <p><strong>状态：</strong>${foundOrder.status}</p>
        <p><strong>下单时间：</strong>${foundOrder.createdAt}</p>
        <hr>
        <p><strong>收货信息</strong></p>
        <p>${foundOrder.address.name}，${foundOrder.address.phone}</p>
        <p>${foundOrder.address.address}</p>
        <hr>
        <p><strong>商品明细</strong></p>
        ${itemsHtml}
        <hr>
        <p style="text-align:right;"><strong>总计：¥${foundOrder.total}</strong></p>
      `;
    }

    // 事件监听
    function setupEventDelegation() {
      document.addEventListener('click', (e) => {
        // 加入购物车
        const addBtn = e.target.closest('.add-to-cart-btn');
        if (addBtn) {
          e.preventDefault();
          const id = Number(addBtn.dataset.id);
          const name = addBtn.dataset.name;
          const price = Number(addBtn.dataset.price);
          addToCart(id, name, price);
        }

        // 购物车 +/-
        if (e.target.closest('.cart-inc')) {
          const btn = e.target.closest('.cart-inc');
          const id = Number(btn.dataset.id);
          updateQuantity(id, 1);
        }
        if (e.target.closest('.cart-dec')) {
          const btn = e.target.closest('.cart-dec');
          const id = Number(btn.dataset.id);
          updateQuantity(id, -1);
        }
        if (e.target.closest('.remove-item')) {
          const btn = e.target.closest('.remove-item');
          const id = Number(btn.dataset.id);
          removeItem(id);
        }
      });

      // 购物车底部邮箱提醒
      document.getElementById('sendEmailReminder').addEventListener('click', () => {
        const email = document.getElementById('reminderEmail').value.trim();
        if (!email || !email.includes('@')) {
          alert('❌ 请输入有效的邮箱地址');
          return;
        }
        let summary = cart.map(i => `${i.name} x${i.quantity} = ¥${i.price*i.quantity}`).join('； ');
        if (!summary) summary = '购物车为空';
        alert(`📧 提醒邮件已发送至 ${email}\n\n购物车内容：\n${summary}\n总计 ¥${calcTotal()}\n(演示模式)`);
      });

      // 结算按钮 -> 显示地址视图
      checkoutBtn.addEventListener('click', () => {
        if (cart.length === 0) {
          alert('购物车是空的，先去添加商品吧');
          return;
        }
        showAddressView();
      });

      // 从地址视图返回购物车
      backToCartFromAddrBtn.addEventListener('click', showCartView);

      // 提交订单按钮
      submitOrderBtn.addEventListener('click', handleSubmitOrder);

      // 从支付视图返回购物车
      backToCartBtn.addEventListener('click', showCartView);

      // 订单查询链接
      queryOrderLink.addEventListener('click', (e) => {
        e.preventDefault();
        showOrderQueryView();
      });

      // 从查询视图返回购物车
      backToCartFromQueryBtn.addEventListener('click', showCartView);

      // 查询按钮
      queryOrderBtn.addEventListener('click', handleQueryOrder);

      // 按回车也可以查询
      orderQueryInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          handleQueryOrder();
        }
      });

      // 点击购物车图标滚动到侧边栏
      document.getElementById('cartToggle').addEventListener('click', () => {
        document.getElementById('cartSidebar').scrollIntoView({ behavior: 'smooth' });
      });
    }

    // 锚点平滑滚动
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        const href = this.getAttribute('href');
        if (href === "#") return;
        const target = document.querySelector(href);
        if (target) {
          e.preventDefault();
          target.scrollIntoView({ behavior: 'smooth' });
        }
      });
    });

    // 初始化
    function init() {
      renderProductGrid();
      renderUniformSection();
      // 预置两个商品方便演示
      addToCart(2, '休闲棉质Polo', 189);
      addToCart(6, '行政衬衫+领带', 349);
      updateCartUI();
      setupEventDelegation();
      // 确保其他视图初始隐藏，购物车视图显示
      showCartView();
    }

    init();
  })();
</script>
</body>
</html>
