<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOS团 · 凉宫春日应援团官方商城</title>
    
    <!-- 字体与图标库 -->
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* ===== 全局变量 & 重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary-brown: #5D4037;
            --secondary-brown: #8D6E63;
            --light-brown: #BCAAA4;
            --pale-brown: #D7CCC8;
            --accent-gold: #FFD54F;
            --bg-overlay: rgba(188, 170, 164, 0.7);
            --card-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            --transition-smooth: cubic-bezier(0.23, 1, 0.32, 1);
        }
        
        body {
            font-family: 'Raleway', sans-serif;
            background-color: var(--light-brown);
            color: #2c3e50;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        /* ===== 动态背景 ===== */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }
        
        .bg-pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 30% 40%, rgba(255,255,255,0.1) 0%, transparent 20%),
                radial-gradient(circle at 70% 60%, rgba(93,64,55,0.1) 0%, transparent 25%),
                repeating-linear-gradient(45deg, rgba(93,64,55,0.02) 0px, rgba(93,64,55,0.02) 2px, transparent 2px, transparent 8px);
            background-size: cover;
        }
        
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(188,170,164,0.85) 0%, rgba(121,85,72,0.7) 100%);
            backdrop-filter: blur(2px);
            z-index: -1;
        }
        
        /* ===== 主容器 ===== */
        .shop-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 30px;
            position: relative;
            z-index: 2;
        }
        
        /* ===== 头部 ===== */
        .shop-header {
            text-align: center;
            margin: 30px 0 40px;
            animation: fadeInDown 0.8s ease;
        }
        
        .sos-badge {
            display: inline-block;
            background: var(--primary-brown);
            color: var(--accent-gold);
            padding: 8px 25px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 3px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .shop-title {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--primary-brown);
            text-shadow: 3px 3px 0 rgba(255,255,255,0.3);
            margin-bottom: 15px;
            line-height: 1.2;
        }
        
        .shop-subtitle {
            font-size: 1.2rem;
            color: #5D4037;
            max-width: 700px;
            margin: 0 auto;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        /* ===== 搜索/过滤栏 ===== */
        .shop-controls {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 40px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(255,255,255,0.5);
        }
        
        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }
        
        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--secondary-brown);
        }
        
        .search-box input {
            width: 100%;
            padding: 15px 20px 15px 45px;
            border: 2px solid transparent;
            border-radius: 30px;
            font-size: 1rem;
            background: white;
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: var(--primary-brown);
            box-shadow: 0 5px 15px rgba(93,64,55,0.2);
        }
        
        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .filter-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            background: white;
            color: var(--primary-brown);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid var(--pale-brown);
        }
        
        .filter-btn.active {
            background: var(--primary-brown);
            color: white;
            border-color: var(--primary-brown);
        }
        
        .filter-btn:hover {
            background: var(--secondary-brown);
            color: white;
        }
        
        /* ===== 商品网格 ===== */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }
        
        /* 商品卡片 */
        .product-card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            transition: all 0.4s var(--transition-smooth);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.5);
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 45px rgba(93,64,55,0.3);
        }
        
        .product-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: var(--accent-gold);
            color: var(--primary-brown);
            font-weight: 700;
            padding: 5px 15px;
            border-radius: 20px;
            z-index: 2;
            font-size: 0.85rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        
        .product-image {
            width: 100%;
            height: 280px;
            object-fit: cover;
            transition: transform 0.6s;
            border-bottom: 3px solid var(--pale-brown);
        }
        
        .product-card:hover .product-image {
            transform: scale(1.05);
        }
        
        .product-info {
            padding: 20px;
            flex: 1;
        }
        
        .product-artist {
            color: var(--secondary-brown);
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        
        .product-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary-brown);
            margin-bottom: 10px;
            line-height: 1.3;
        }
        
        .product-desc {
            color: #5f5f5f;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px 20px;
            border-top: 1px solid var(--pale-brown);
        }
        
        .product-price {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-brown);
        }
        
        .product-price small {
            font-size: 0.9rem;
            font-weight: 400;
            color: #999;
        }
        
        .add-to-cart {
            background: var(--primary-brown);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .add-to-cart:hover {
            background: var(--secondary-brown);
            transform: scale(1.1);
        }
        
        /* ===== 购物车侧栏 ===== */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 380px;
            height: 100vh;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(15px);
            box-shadow: -5px 0 30px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: right 0.4s var(--transition-smooth);
            display: flex;
            flex-direction: column;
            border-left: 2px solid var(--pale-brown);
        }
        
        .cart-sidebar.open {
            right: 0;
        }
        
        .cart-header {
            padding: 25px;
            border-bottom: 2px solid var(--pale-brown);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .cart-header h3 {
            font-size: 1.5rem;
            color: var(--primary-brown);
        }
        
        .close-cart {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--secondary-brown);
        }
        
        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .cart-item {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .cart-item-img {
            width: 70px;
            height: 70px;
            border-radius: 10px;
            object-fit: cover;
        }
        
        .cart-item-info {
            flex: 1;
        }
        
        .cart-item-title {
            font-weight: 600;
            color: var(--primary-brown);
            margin-bottom: 5px;
        }
        
        .cart-item-price {
            color: var(--secondary-brown);
            font-weight: 600;
        }
        
        .cart-item-remove {
            color: #e74c3c;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .cart-footer {
            padding: 25px;
            border-top: 2px solid var(--pale-brown);
        }
        
        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-brown);
            margin-bottom: 20px;
        }
        
        .checkout-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary-brown);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .checkout-btn:hover {
            background: var(--secondary-brown);
        }
        
        .cart-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 65px;
            height: 65px;
            background: var(--primary-brown);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(93,64,55,0.4);
            z-index: 99;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .cart-toggle:hover {
            transform: scale(1.1);
        }
        
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--accent-gold);
            color: var(--primary-brown);
            width: 25px;
            height: 25px;
            border-radius: 50%;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        
        /* ===== 大图预览模态框 ===== */
        .product-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        .product-modal.active {
            display: flex;
        }
        
        .modal-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }
        
        .modal-image {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.8rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .modal-caption {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1.1rem;
            backdrop-filter: blur(10px);
        }
        
        /* ===== 动画 ===== */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .shop-container { padding: 15px; }
            .shop-title { font-size: 2.2rem; }
            .shop-subtitle { font-size: 1rem; }
            .product-grid { grid-template-columns: 1fr; }
            .cart-sidebar { width: 100%; right: -100%; }
            .shop-controls { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <!-- 背景 -->
    <div class="bg-container">
        <div class="bg-pattern"></div>
    </div>
    <div class="bg-overlay"></div>
    
    <!-- 购物车侧栏 -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3><i class="fas fa-shopping-cart" style="margin-right: 10px;"></i>我的购物车</h3>
            <button class="close-cart" onclick="toggleCart()"><i class="fas fa-times"></i></button>
        </div>
        <div class="cart-items" id="cartItems">
            <!-- 动态购物车内容 -->
            <div style="text-align: center; color: #999; padding: 40px 0;">
                <i class="fas fa-shopping-bag" style="font-size: 3rem; margin-bottom: 15px; opacity: 0.3;"></i>
                <p>购物车还是空的</p>
                <p style="font-size: 0.9rem;">快去添加一些精美的画作吧~</p>
            </div>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>总计</span>
                <span id="cartTotal">¥0</span>
            </div>
            <button class="checkout-btn" onclick="alert('结算功能开发中，但您的喜爱已收到！')">去结算</button>
        </div>
    </div>
    
    <!-- 购物车悬浮按钮 -->
    <button class="cart-toggle" onclick="toggleCart()">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-count" id="cartCount">0</span>
    </button>
    
    <!-- 大图预览模态框 -->
    <div class="product-modal" id="productModal">
        <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
        <div class="modal-content">
            <img src="" alt="" class="modal-image" id="modalImage">
            <div class="modal-caption" id="modalCaption"></div>
        </div>
    </div>
    
    <!-- 主商城容器 -->
    <div class="shop-container">
        <!-- 头部 -->
        <header class="shop-header">
            <div class="sos-badge">
                <i class="fas fa-star"></i> SOS団 广东支部 <i class="fas fa-star"></i>
            </div>
            <h1 class="shop-title">涼宮ハルヒ<br>OFFICIAL SHOP</h1>
            <div class="shop-subtitle">
                <i class="fas fa-paint-brush" style="margin-right: 10px;"></i>
                美工组原画 · 限定周边 · 应援团特供
            </div>
        </header>
        
        <!-- 控制栏 -->
        <div class="shop-controls">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="搜索作品、画师..." onkeyup="filterProducts()">
            </div>
            <div class="filter-tags">
                <button class="filter-btn active" onclick="filterByArtist('all')">全部</button>
                <button class="filter-btn" onclick="filterByArtist('Yikun')">Yikun</button>
                <button class="filter-btn" onclick="filterByArtist('荡漾')">荡漾</button>
                <button class="filter-btn" onclick="filterByArtist('咔啦')">咔啦</button>
                <button class="filter-btn" onclick="filterByArtist('咕噜')">咕噜</button>
                <button class="filter-btn" onclick="filterByArtist('Potaro')">Potaro</button>
                <button class="filter-btn" onclick="filterByArtist('阿笑')">阿笑</button>
            </div>
        </div>
        
        <!-- 商品网格 -->
        <div class="product-grid" id="productGrid"></div>
        
        <!-- 底部信息 -->
        <footer style="text-align: center; margin: 60px 0 30px; color: var(--primary-brown);">
            <p><i class="fas fa-copyright"></i> 凉宫春日应援团广东支部 · 作品版权归画师所有</p>
            <p style="margin-top: 10px; font-size: 0.9rem;">本商城为同人展示站 · 所有收入将用于支持创作</p>
        </footer>
    </div>
    
    <script>
        // ========== 商品数据 ==========
        const products = [
            // Yikun
            { id: 1, name: '广东支部旗帜', artist: 'Yikun', desc: '融合广东元素与团长符号，限定旗帜设计', price: 128, image: 'picture/Yikun Gu1.png', badge: '限定' },
            { id: 2, name: '祭典游乐', artist: 'Yikun', desc: '八月不再循环，只有祭典。', price: 88, image: 'picture/Yikun Gu2.png', badge: '新作' },
            { id: 3, name: '新年参拜', artist: 'Yikun', desc: '佐佐木与凉宫的参拜愿望', price: 96, image: 'picture/Yikun Gu3.png' },
            { id: 4, name: '观影会纸袋', artist: 'Yikun', desc: '一年一次的观影会限定设计', price: 158, image: 'picture/Yikun Gu4.png', badge: '限量' },
            // 荡漾
            { id: 5, name: '编辑中-荡漾01', artist: '荡漾', desc: '画师正在准备中...', price: 0, image: 'picture/1.png' },
            { id: 6, name: '编辑中-荡漾02', artist: '荡漾', desc: '敬请期待', price: 0, image: 'picture/1.jpg' },
            // 咔啦
            { id: 7, name: 'Yuki in Blush', artist: '咔啦', desc: '命运交织，霓虹诉说', price: 108, image: 'picture/Kala1.png', badge: '热门' },
            // 咕噜
            { id: 8, name: 'Yuki"请选择我"', artist: '咕噜', desc: '可以，选择我吗？', price: 76, image: 'picture/gulu1.jpg' },
            { id: 9, name: 'Yuki冬日长门其一', artist: '咕噜', desc: '是否启动程序？', price: 82, image: 'picture/gulu2.png' },
            { id: 10, name: 'Yuki冬日长门其二', artist: '咕噜', desc: '加入文学部吗', price: 82, image: 'picture/gulu3.png' },
            // Potaro
            { id: 11, name: '凉宫春日·出摊', artist: 'Potaro', desc: '本团长难得出来，你居然敢不来？', price: 99, image: 'picture/Potaro1.jpg', badge: '新作' },
            // 阿笑
            { id: 12, name: '消失日常其一', artist: '阿笑', desc: '欢迎加入文学部，阿虚', price: 88, image: 'picture/Axiao1.png' },
            { id: 13, name: '忧郁日常其一', artist: '阿笑', desc: '欢迎来到SOS团！', price: 88, image: 'picture/Axiao2.png' },
            { id: 14, name: '弹射联动', artist: '阿笑', desc: '大家一起变成异世界人', price: 92, image: 'picture/Axiao3.png' },
            { id: 15, name: '凉宫生贺', artist: '阿笑', desc: 'Happy Birthday!', price: 96, image: 'picture/Axiao4.png', badge: '生日限定' }
        ];
        
        // ========== 购物车 ==========
        let cart = [];
        
        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('open');
        }
        
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            const existing = cart.find(item => item.id === productId);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            updateCartUI();
            // 自动打开侧栏提示
            document.getElementById('cartSidebar').classList.add('open');
            
            // 显示一个小提示
            const toast = document.createElement('div');
            toast.style.position = 'fixed';
            toast.style.bottom = '100px';
            toast.style.right = '30px';
            toast.style.background = 'var(--primary-brown)';
            toast.style.color = 'white';
            toast.style.padding = '10px 20px';
            toast.style.borderRadius = '30px';
            toast.style.zIndex = '1001';
            toast.style.animation = 'fadeInDown 0.3s';
            toast.innerHTML = `<i class="fas fa-check-circle"></i> 已加入购物车`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCartUI();
        }
        
        function updateCartUI() {
            const cartItemsEl = document.getElementById('cartItems');
            const cartTotalEl = document.getElementById('cartTotal');
            const cartCountEl = document.getElementById('cartCount');
            
            let total = 0;
            let count = 0;
            let html = '';
            
            if (cart.length === 0) {
                html = '<div style="text-align: center; color: #999; padding: 40px 0;"><i class="fas fa-shopping-bag" style="font-size: 3rem; margin-bottom: 15px; opacity: 0.3;"></i><p>购物车还是空的</p><p style="font-size: 0.9rem;">快去添加一些精美的画作吧~</p></div>';
            } else {
                cart.forEach(item => {
                    total += item.price * item.quantity;
                    count += item.quantity;
                    html += `
                        <div class="cart-item">
                            <img src="${item.image}" class="cart-item-img" alt="${item.name}" onerror="this.src='https://via.placeholder.com/70x70?text=No+Image'">
                            <div class="cart-item-info">
                                <div class="cart-item-title">${item.name}</div>
                                <div class="cart-item-price">¥${item.price} x ${item.quantity}</div>
                                <div class="cart-item-remove" onclick="removeFromCart(${item.id})"><i class="fas fa-trash-alt"></i> 移除</div>
                            </div>
                        </div>
                    `;
                });
            }
            
            cartItemsEl.innerHTML = html;
            cartTotalEl.textContent = `¥${total}`;
            cartCountEl.textContent = count;
        }
        
        // ========== 渲染商品 ==========
        function renderProducts(filteredProducts) {
            const grid = document.getElementById('productGrid');
            if (filteredProducts.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:60px; background:rgba(255,255,255,0.5); border-radius:20px;"><i class="fas fa-search" style="font-size:3rem; opacity:0.5; margin-bottom:20px;"></i><h3>没有找到相关作品</h3><p>试试其他关键词吧~</p></div>';
                return;
            }
            
            grid.innerHTML = filteredProducts.map(p => `
                <div class="product-card" onclick="openModal('${p.image}', '${p.name} — ${p.artist}')">
                    ${p.badge ? `<div class="product-badge">${p.badge}</div>` : ''}
                    <img src="${p.image}" class="product-image" alt="${p.name}" onerror="this.src='https://via.placeholder.com/300x280?text=预览图'">
                    <div class="product-info">
                        <div class="product-artist"><i class="fas fa-user"></i> ${p.artist}</div>
                        <div class="product-title">${p.name}</div>
                        <div class="product-desc">${p.desc}</div>
                    </div>
                    <div class="product-footer">
                        <span class="product-price">¥${p.price} <small>起</small></span>
                        <button class="add-to-cart" onclick="event.stopPropagation(); addToCart(${p.id})"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            `).join('');
        }
        
        // ========== 过滤逻辑 ==========
        let currentFilter = 'all';
        let searchTerm = '';
        
        function filterByArtist(artist) {
            currentFilter = artist;
            // 更新按钮状态
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.trim() === artist || (artist === 'all' && btn.textContent === '全部')) {
                    btn.classList.add('active');
                }
            });
            applyFilters();
        }
        
        function filterProducts() {
            searchTerm = document.getElementById('searchInput').value.toLowerCase();
            applyFilters();
        }
        
        function applyFilters() {
            let filtered = products;
            
            // 画师过滤
            if (currentFilter !== 'all') {
                filtered = filtered.filter(p => p.artist === currentFilter);
            }
            
            // 搜索过滤
            if (searchTerm) {
                filtered = filtered.filter(p => 
                    p.name.toLowerCase().includes(searchTerm) || 
                    p.artist.toLowerCase().includes(searchTerm) ||
                    p.desc.toLowerCase().includes(searchTerm)
                );
            }
            
            renderProducts(filtered);
        }
        
        // ========== 模态框 ==========
        function openModal(src, caption) {
            document.getElementById('modalImage').src = src;
            document.getElementById('modalCaption').textContent = caption;
            document.getElementById('productModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
        }
        
        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', () => {
            renderProducts(products);
            updateCartUI();
            
            // 点击模态框背景关闭
            document.getElementById('productModal').addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });
            
            // 键盘ESC关闭模态框
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeModal();
                    if (document.getElementById('cartSidebar').classList.contains('open')) {
                        document.getElementById('cartSidebar').classList.remove('open');
                    }
                }
            });
        });
    </script>
</body>
</html>
